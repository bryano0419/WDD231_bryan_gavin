<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookQuest | Search</title>
    <link rel="stylesheet" href="css/base.css">
</head>
<body>
    <header>
        <h1>BookQuest</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="search-section">
            <h2>Find Your Next Adventure</h2>
            <form id="book-search-form">
                <label for="search-term" class="hidden-visually" style="display:none;">Search Books</label>
                <input type="text" id="search-term" placeholder="Search by title or author..." required>
                
                <label for="genre-filter" class="hidden-visually" style="display:none;">Filter by Genre</label>
                <select id="genre-filter">
                    <option value="all">All Genres</option>
                    <option value="fantasy">Fantasy</option>
                    <option value="sci-fi">Sci-Fi</option>
                    <option value="mystery">Mystery</option>
                    <option value="non-fiction">Non-Fiction</option>
                </select>
                
                <button type="submit">Search</button>
            </form>
        </section>

        <div id="loader-container" class="hidden">
            <div class="book">
                <div class="inner">
                    <div class="left"></div>
                    <div class="middle"></div>
                    <div class="right"></div>
                </div>
                <ul>
                    <li></li><li></li><li></li><li></li><li></li>
                </ul>
            </div>
            <p>Scanning the library...</p>
        </div>

        <section id="results-area">
            <div id="book-grid" class="grid-display">
                </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 BookQuest Team</p>
        <p id="last-search">Last search: <span>None</span></p>
    </footer>

    <script type="module" src="js/main.js"></script>
</body>
</html>
