<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details | BookQuest</title>
    <link rel="stylesheet" href="css/base.css">
</head>
<body>
    <header>
        <h1>BookQuest</h1>
        <a href="index.html" style="color: white; text-decoration: none; font-weight: bold;">← Back to Search</a>
    </header>

    <main id="details-container">
        <div class="detail-card">
            <h2 id="book-title">Loading book details...</h2>
            <hr>
            <p><strong>Author:</strong> <span id="book-author">...</span></p>
            <p><strong>Description:</strong></p>
            <p id="book-desc">Fetching the summary from Open Library...</p>
            
            <div id="details-loader" class="loader-small"></div>
        </div>
    </main>

    <script type="module" src="js/details.js"></script>
</body>
</html>
